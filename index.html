<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cIM — Sign On</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Login Screen ─────────────────────────────────── -->
  <div id="login-screen">
    <div class="cim-window" id="login-window">
      <div class="titlebar">
        <div class="titlebar-icon">💬</div>
        <span class="titlebar-title">cIM — Sign On</span>
        <div class="titlebar-buttons">
          <button class="win-btn close" onclick="location.reload()">✕</button>
        </div>
      </div>
      <div class="login-body">
        <div class="cim-logo">
          <div class="logo-icon">🏃‍♂️</div>
          <div>
            <div class="logo-name">cIM</div>
            <div class="logo-sub">commodore Instant Messenger</div>
          </div>
        </div>
        <div class="field-group">
          <label>Screen Name:</label>
          <input class="cim-input" id="login-username" type="text" autocomplete="off" />
        </div>
        <div class="field-group">
          <label>Password:</label>
          <input class="cim-input" id="login-password" type="password" />
        </div>
        <div class="login-error" id="login-error"></div>
        <div class="btn-row">
          <button class="cim-btn" id="btn-login">Sign On</button>
          <button class="cim-btn" id="btn-show-register">Setup</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Desktop ──────────────────────────────────────── -->
  <div id="desktop">

    <!-- Buddy List -->
    <div class="cim-window" id="buddy-list-window">
      <div class="titlebar" id="buddy-titlebar">
        <div class="titlebar-icon">💬</div>
        <span class="titlebar-title">cIM</span>
        <div class="titlebar-buttons">
          <button class="win-btn close" id="btn-signoff" title="Sign Off">✕</button>
        </div>
      </div>
      <div class="buddy-list-header">
        <div class="buddy-self">
          <div class="status-dot online" id="self-status-dot"></div>
          <span class="buddy-self-name" id="self-name">—</span>
        </div>
      </div>
      <div class="buddy-toolbar">
        <button class="tool-btn" id="btn-add-buddy">Add</button>
        <button class="tool-btn" id="btn-set-away">Away</button>
        <button class="tool-btn" id="btn-open-rooms">Rooms</button>
      </div>
      <div class="buddy-list-body" id="buddy-list-body">
      </div>
    </div>

    <!-- Away Message Dialog -->
    <div class="cim-window" id="away-dialog">
      <div class="titlebar" id="away-titlebar">
        <span class="titlebar-title">Set Away Message</span>
        <div class="titlebar-buttons">
          <button class="win-btn close" id="btn-close-away">✕</button>
        </div>
      </div>
      <div class="away-body">
        <label>Away Message:</label>
        <textarea class="away-input" id="away-input"></textarea>
        <div class="btn-row">
          <button class="cim-btn" id="btn-save-away">OK</button>
          <button class="cim-btn" id="btn-clear-away">Clear</button>
        </div>
      </div>
    </div>

    <!-- Add Buddy Dialog -->
    <div class="cim-window" id="add-buddy-dialog">
      <div class="titlebar" id="add-buddy-titlebar">
        <span class="titlebar-title">Add a Buddy</span>
        <div class="titlebar-buttons">
          <button class="win-btn close" id="btn-close-add-buddy">✕</button>
        </div>
      </div>
      <div class="add-buddy-body">
        <label>Screen Name:</label>
        <input class="cim-input" id="add-buddy-input" type="text" autocomplete="off" />
        <div class="btn-row">
          <button class="cim-btn" id="btn-do-add-buddy">Add</button>
        </div>
        <div class="dialog-msg" id="add-buddy-msg"></div>
      </div>
    </div>

    <!-- Rooms Window -->
    <div class="cim-window" id="rooms-window">
      <div class="titlebar" id="rooms-titlebar">
        <span class="titlebar-title">Chat Rooms</span>
        <div class="titlebar-buttons">
          <button class="win-btn close" id="btn-close-rooms">✕</button>
        </div>
      </div>
      <div class="rooms-body">
        <div id="rooms-list"></div>
        <div class="room-create-row">
          <input class="cim-input" id="new-room-input" placeholder="new-room" />
          <button class="cim-btn" id="btn-create-room">Create</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button class="start-btn">
      🏃‍♂️ cIM
    </button>
    <div class="taskbar-items" id="taskbar-items"></div>
    <div class="taskbar-tray">
      <div class="conn-mode-toggle" id="conn-mode-toggle" title="Click to toggle WS/REST">
        <div class="conn-indicator ws" id="conn-indicator"></div>
        <span id="conn-mode-text">WS</span>
      </div>
      <span class="taskbar-clock" id="taskbar-clock"></span>
    </div>
  </div>

  <div id="disconnect-banner">Disconnected. Trying to reconnect...</div>

  <script src="app.js"></script>
</body>

</html>
